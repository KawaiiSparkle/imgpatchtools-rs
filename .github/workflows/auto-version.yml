name: Auto Version & Edition

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update Cargo.toml version
        id: update
        run: |
          # 设置时区为 UTC+8
          export TZ="Asia/Shanghai"

          # 获取今天的日期 (YYYYMMDD)
          DATE=$(date +%Y%m%d)

          # 计算今天第几次推送 (UTC+8, 查询 git log 中今天的提交数)
          TODAY_START="$(date +%Y-%m-%d) 00:00:00"
          TODAY_END="$(date +%Y-%m-%d) 23:59:59"
          PUSH_NUM=$(git log --oneline --since="$TODAY_START" --until="$TODAY_END" | wc -l)
          PUSH_NUM=$((PUSH_NUM + 1))

          # 限制到 99 次 (超过从 0.0 开始循环)
          if [ $PUSH_NUM -gt 99 ]; then
            PUSH_NUM=99
          fi

          # 计算 minor 和 patch: 0.1 -> 9.9 对应第 1-99 次
          MINOR=$(( (PUSH_NUM - 1) / 10 ))
          PATCH=$(( (PUSH_NUM - 1) % 10 ))

          # 新的 version 格式: MAJOR.MINOR.PATCH = 日期.X.Y
          NEW_VERSION="${DATE}.${MINOR}.${PATCH}"

          echo "Push number: $PUSH_NUM"
          echo "New version: $NEW_VERSION"

          # 更新 Cargo.toml (edition 保持 2024 不变)
          sed -i "s/^version = \"[^\"]*\"/version = \"$NEW_VERSION\"/" Cargo.toml

          # 输出变量供后续步骤使用
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        run: |
          git add Cargo.toml
          git diff --cached --quiet || {
            git commit -m "chore: auto update version=${{ steps.update.outputs.version }}"
            git push
          }

      - name: Create GitHub Release (optional)
        if: false  # 设置为 true 启用自动 release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.update.outputs.version }}
          name: Release v${{ steps.update.outputs.version }}
          body: |
            Auto-generated release
          draft: false
          prerelease: true
